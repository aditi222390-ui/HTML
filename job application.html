<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Application Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            background: white;
            padding: 25px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        fieldset {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 5px;
        }

        legend {
            font-weight: bold;
            color: #007bff;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .gender-group {
            margin-top: 5px;
        }

        .gender-group input {
            width: auto;
        }

        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Job Application Form</h2>

    <form>

        <!-- Personal Details -->
        <fieldset>
            <legend>Personal Details</legend>

            <label>Full Name</label>
            <input type="text" name="fullname" required>

            <label>Father's Name</label>
            <input type="text" name="fathername" required>

            <label>Date of Birth</label>
            <input type="date" name="dob" required>

            <label>Gender</label>
            <div class="gender-group">
                <input type="radio" name="gender" value="Male"> Male
                <input type="radio" name="gender" value="Female"> Female
            </div>

            <label>Mobile Number</label>
            <input type="tel" name="mobile" required>

            <label>Email Address</label>
            <input type="email" name="email" required>

            <label>Marital Status</label>
            <select name="marital_status">
                <option value="">Select</option>
                <option>Single</option>
                <option>Married</option>
                <option>Divorced</option>
                <option>Widowed</option>
            </select>
        </fieldset>

        <!-- Education Details -->
        <fieldset>
            <legend>Education Details</legend>

            <label>10th Percentage (%)</label>
            <input type="number" step="0.01" name="tenth_percentage">

            <label>12th Percentage (%)</label>
            <input type="number" step="0.01" name="twelfth_percentage">

            <label>Graduation Degree</label>
            <input type="text" name="graduation">

            <label>University Name</label>
            <input type="text" name="university">

            <label>Passing Year</label>
            <input type="number" name="passing_year">
        </fieldset>

        <!-- Experience Details -->
        <fieldset>
            <legend>Experience Details</legend>

            <label>Total Experience (Years)</label>
            <input type="number" step="0.1" name="experience">

        </fieldset>

        <button type="submit">Submit Application</button>

    </form>
</div>

</body>
</html>
